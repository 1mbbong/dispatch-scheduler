version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: dispatch_scheduler_db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: dispatch_scheduler
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

volumes:
  postgres_data:
